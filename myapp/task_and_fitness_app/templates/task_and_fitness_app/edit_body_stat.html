{% extends 'task_and_fitness_app/base.html' %}

{% block title %}Edit Body Stat{% endblock %}

{% block content %}
<h2>Edit Body Stat</h2>
<form method="post">
  {% csrf_token %}
  <input type="number" step="0.1" name="weight" class="form-control mb-2" value="{{ stat.weight }}" required>
  <input type="number" step="0.1" name="height" class="form-control mb-2" value="{{ stat.height }}" required>
  <button type="submit" class="btn btn-primary mt-2">Update</button>
</form>
{% endblock %}
