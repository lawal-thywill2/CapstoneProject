{% extends 'task_and_fitness_app/base.html' %}

{% block title %}Add Body Stat{% endblock %}

{% block content %}
<h2>Add Body Stat</h2>
<form method="post">
  {% csrf_token %}
  <input type="number" step="0.1" name="weight" class="form-control mb-2" placeholder="Weight (kg)" required>
  <input type="number" step="0.1" name="height" class="form-control mb-2" placeholder="Height (cm)" required>
  <button type="submit" class="btn btn-success mt-2">Add Record</button>
</form>
{% endblock %}
